name: "butter.sh"
version: "1.0.0"
description: "A bash ecosystem"
author: "valknar@pivoine.art"
license: "MIT"

references:
- https://github.com/butter-sh/leaf.sh.git
- https://github.com/butter-sh/whip.sh.git
- https://github.com/butter-sh/icony.sh.git

scripts:
  icons: INPUT_DIR=./_assets/icons OUTPUT_DIR=./docs/_assets/styles arty exec icony generate
  predocs: |
    arty icons
  docs: |
    arty predocs &&
    arty exec leaf . --logo ./icon.svg --landing --projects "$(cat ./projects.json | jq -c .)" -o ./docs
